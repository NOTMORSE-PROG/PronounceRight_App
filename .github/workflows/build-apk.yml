name: Build Android APK

on:
  workflow_run:
    workflows: ["Lint"]
    types: [completed]
    branches: [master]

  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    name: Build APK (${{ github.event.inputs.build_type || 'release' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify LFS files
        run: |
          echo "Checking LFS model files..."
          FILE_SIZE=$(stat --printf="%s" assets/models/ggml-base.en-q5_1.bin)
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "::error::LFS file is a pointer ($FILE_SIZE bytes). Whisper model should be ~57MB."
            exit 1
          fi
          echo "LFS verified — whisper model: $((FILE_SIZE / 1048576))MB"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.1.12297006"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate native project
        run: npx expo prebuild --clean --platform android

      - name: Boost Gradle memory
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> android/gradle.properties

      - name: Decode release keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          cat >> android/gradle.properties << EOF
          RELEASE_STORE_FILE=./release.keystore
          RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Determine Gradle command
        id: gradle
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          if [ "$BUILD_TYPE" = "debug" ]; then
            echo "command=assembleDebug" >> "$GITHUB_OUTPUT"
            echo "apk_path=android/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_OUTPUT"
            echo "apk_name=SpeakRight-debug.apk" >> "$GITHUB_OUTPUT"
          else
            echo "command=assembleRelease" >> "$GITHUB_OUTPUT"
            echo "apk_path=android/app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"
            echo "apk_name=SpeakRight-release.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew ${{ steps.gradle.outputs.command }} --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.gradle.outputs.apk_name }}
          path: ${{ steps.gradle.outputs.apk_path }}
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          echo "## Android APK Build — \`$BUILD_TYPE\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "${{ steps.gradle.outputs.apk_path }}" ]; then
            APK_SIZE=$(stat --printf="%s" "${{ steps.gradle.outputs.apk_path }}")
            echo "**Status:** Built successfully" >> "$GITHUB_STEP_SUMMARY"
            echo "**Size:** $((APK_SIZE / 1048576))MB" >> "$GITHUB_STEP_SUMMARY"
            echo "**Artifact:** \`${{ steps.gradle.outputs.apk_name }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Download the APK from the **Artifacts** section above." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Status:** Build failed" >> "$GITHUB_STEP_SUMMARY"
            echo "Check the build logs for details." >> "$GITHUB_STEP_SUMMARY"
          fi
