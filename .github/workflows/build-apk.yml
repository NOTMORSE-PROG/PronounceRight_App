name: Build Android APK

on:
  workflow_run:
    workflows: ["Lint"]
    types: [completed]
    branches: [master]

  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    name: Build APK (${{ matrix.variant }} / ${{ github.event.inputs.build_type || 'release' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write

    strategy:
      matrix:
        variant: [user, admin]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download large assets
        run: |
          gh release download assets-v1 \
            --repo NOTMORSE-PROG/PronounceRight_App \
            --dir assets/models \
            --pattern "*.bin" \
            --clobber
          gh release download assets-v1 \
            --repo NOTMORSE-PROG/PronounceRight_App \
            --dir assets/videos/m3c3 \
            --pattern "*.mp4" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify assets
        run: |
          echo "Checking model files..."
          FILE_SIZE=$(stat --printf="%s" assets/models/ggml-base.en-q5_1.bin)
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "::error::Whisper model download failed ($FILE_SIZE bytes)."
            exit 1
          fi
          echo "Whisper model: $((FILE_SIZE / 1048576))MB ✓"

          echo "Checking video files..."
          VIDEO_ERRORS=0
          while IFS= read -r -d '' f; do
            SIZE=$(stat --printf="%s" "$f")
            if [ "$SIZE" -lt 10000 ]; then
              echo "::error::Video too small: $f ($SIZE bytes)"
              VIDEO_ERRORS=$((VIDEO_ERRORS + 1))
            fi
          done < <(find assets/videos -name "*.mp4" -print0)
          if [ "$VIDEO_ERRORS" -gt 0 ]; then
            echo "::error::$VIDEO_ERRORS video(s) failed verification."
            exit 1
          fi
          VIDEO_COUNT=$(find assets/videos -name "*.mp4" | wc -l)
          echo "$VIDEO_COUNT videos ✓"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate native project
        env:
          EXPO_PUBLIC_IS_ADMIN: ${{ matrix.variant == 'admin' && 'true' || 'false' }}
        run: npx expo prebuild --clean --platform android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Boost Gradle memory
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> android/gradle.properties

      - name: Decode release keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          cat >> android/gradle.properties << EOF
          RELEASE_STORE_FILE=./release.keystore
          RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Determine Gradle command
        id: gradle
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          if [ "$BUILD_TYPE" = "debug" ]; then
            echo "command=assembleDebug" >> "$GITHUB_OUTPUT"
            echo "apk_path=android/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_OUTPUT"
          else
            echo "command=assembleRelease" >> "$GITHUB_OUTPUT"
            echo "apk_path=android/app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"
          fi
          echo "build_type=$BUILD_TYPE" >> "$GITHUB_OUTPUT"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew ${{ steps.gradle.outputs.command }} --no-daemon -PreactNativeArchitectures=arm64-v8a

      - name: Extract git metadata
        id: meta
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          BRANCH_SLUG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g')
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha || github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d-%H%M)
          COMMIT_MSG=$(git log -1 --format="%s")
          BUILD_TYPE="${{ steps.gradle.outputs.build_type }}"
          VARIANT="${{ matrix.variant }}"
          APK_NAME="SpeakRight-${VARIANT}-${BUILD_TYPE}-${BRANCH_SLUG}-${SHORT_SHA}-${TIMESTAMP}.apk"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "branch_slug=$BRANCH_SLUG" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp "${{ steps.gradle.outputs.apk_path }}" ${{ steps.meta.outputs.apk_name }}

      - name: Delete existing release and tag
        run: |
          TAG=${{ matrix.variant == 'admin' && 'latest-admin' || 'latest' }}
          gh release delete "$TAG" --cleanup-tag --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.variant == 'admin' && 'latest-admin' || 'latest' }}
          name: ${{ matrix.variant == 'admin' && 'SpeakRight Admin — Latest Build' || 'SpeakRight — Latest Build' }}
          body: |
            **Variant:** `${{ matrix.variant }}`
            **Branch:** `${{ steps.meta.outputs.branch }}`
            **Commit:** `${{ steps.meta.outputs.short_sha }}`
            **Message:** ${{ steps.meta.outputs.commit_msg }}
            **Build type:** `${{ steps.gradle.outputs.build_type }}`
            **Built:** ${{ steps.meta.outputs.timestamp }}
          files: ${{ steps.meta.outputs.apk_name }}
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        if: always()
        run: |
          echo "## SpeakRight APK Build (${{ matrix.variant }})" >> $GITHUB_STEP_SUMMARY
          echo "- **APK:** \`${{ steps.meta.outputs.apk_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Variant:** \`${{ matrix.variant }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ steps.meta.outputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ steps.meta.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Build type:** \`${{ steps.gradle.outputs.build_type }}\`" >> $GITHUB_STEP_SUMMARY
